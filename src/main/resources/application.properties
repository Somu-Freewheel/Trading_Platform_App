spring.application.name=trading_app
server.port=8080
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:postgresql://postgres-db:5432/trading_app
spring.datasource.username=postgres
spring.datasource.password=user123
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql: true

spring.redis.host=redis
spring.redis.port=6379
spring.redis.timeout=60000ms
spring.redis.jedis.pool.max-active=8
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=0

stripe.api.key=your_stripe_api_key
razorpay.api.key=your_razorpay_api_key
stripe.api.secret=your_stripe_api_secret
razorpay.api.secret=your_razorpay_api_secret

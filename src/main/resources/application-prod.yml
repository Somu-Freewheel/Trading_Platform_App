spring:
  datasource:
    url: jdbc:postgresql://postgres-prod:5432/trading_app_prod
    username: postgres
    password: prod_secure_pass
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: WARN
    com.your_package: INFO

server:
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
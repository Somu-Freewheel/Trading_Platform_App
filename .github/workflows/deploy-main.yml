name: Deploy main


on:
  push:
    branches:
        - main

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
           distribution: temurin
           java-version: '17'

      - name: Build Spring Boot Application
        run: mvn clean package -DskipTests


      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ secrets.GHCR_OWNER }}/trading-app:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ secrets.GHCR_OWNER }}/trading-app:${{ github.sha }}

      - name: Checkout Kubernetes Repository
        uses: actions/checkout@v4
        with:
          repository: Somu-Freewheel/Trading_Platform_K8S
          token: ${{ secrets.K8S_REPO_TOKEN }}
          path: Trading_Platform_K8S

      - name: Update Kubernetes Image Tag
        run: |
            cd Trading_Platform_K8S
          
            sed -i \
            "s#ghcr.io/somu-freewheel/trading-app:.*#ghcr.io/${{ secrets.GHCR_OWNER }}/trading-app:${{ github.sha }}#" \
            trading-app/deployment.yaml

      - name: Create Kubernetes Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
            token: ${{ secrets.K8S_REPO_TOKEN }}
            path: Trading_Platform_K8S
            branch: update-trading-app-${{ github.sha }}
            base: main
            title: "Update trading-app image to ${{ github.sha }}"
            commit-message: "Update trading-app image to ${{ github.sha }}"
            body: |
              ## Automated Kubernetes image update
            Application repository:
              Trading_Platform_App
            New Docker image:

              ghcr.io/${{ secrets.GHCR_OWNER }}/trading-app:${{ github.sha }}
              This PR updates the Kubernetes deployment image tag.









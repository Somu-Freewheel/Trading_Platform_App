name: Deploy main


on:
  push:
    branches:
        - main

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
           distribution: temurin
           java-version: '17'

      - name: Build Spring Boot Application
        run: mvn clean package -DskipTests


      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ secrets.GHCR_OWNER }}/trading-app:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ secrets.GHCR_OWNER }}/trading-app:${{ github.sha }}

      - name: Update Kubernetes manifest
        run: |
          git clone https://${{ secrets.K8S_REPO_TOKEN }}@github.com/Somu-Freewheel/Trading_Platform_K8S.git
          cd Trading_Platform_K8S
          sed -i "s#ghcr.io/somu-freewheel/trading-app:.*#ghcr.io/somu-freewheel/trading-app:${{ github.sha }}#" trading-app/deployment.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add trading-app/deployment.yaml
          git commit -m "Update trading-app image to ${{ github.sha }}"
          git push origin main






